apiVersion: apps/v1
kind: Deployment
metadata:
  name: zomato-app
spec:
  replicas: 10
  selector:
    matchLabels:
      app: zomato
  template:
    metadata:
      labels:
        app: zomato
    spec:
      containers:
      - name: zomato-container
        image: 224075521027.dkr.ecr.us-east-1.amazonaws.com/zomato-app:latest
        ports:
        - containerPort: 3000
